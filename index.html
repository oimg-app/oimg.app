<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/oimg-logo.svg" />
    <link rel="alternate icon" type="image/png" href="/oimg-logo-1024.png" />
    <link rel="apple-touch-icon" href="/oimg-logo-1024.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="oimg.app — 100% client-side batch image optimizer. Drop assets, adjust settings once, walk away with optimized files + ZIP + paste-ready snippets. Nothing leaves the browser." />
    <meta name="theme-color" content="#5eb87a" />
    <script>
      // Phase 07-polish / Plan 02 — FOUC fix: set theme synchronously before first paint.
      (function () {
        try {
          var t = localStorage.getItem('oimg-theme') || 'dark';
          document.documentElement.classList.toggle('dark', t === 'dark');
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <title>oimg.app — Image Optimizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
